syntax = "proto3";

option csharp_namespace = "EDDY.IS.AdMatching.Service";

package Catalogs;

// The Definition of the Ads Service
service Campaings {
  // Sends a greeting
  rpc getCampaings (CampaingsRequest) returns (CampaingsResponse);
}

// Campaings Messages
message CampaingsRequest {
	
	string transactionGUID=1;
	string placementGUID=2;
    string ipAdress=3;
    int32 localHour=4;
    string placementId=5;
    string sub1=6;
    string sub2=7;
    string sub_=8;
    string sub4=9;
    string ua=10;
    string url=11;
    int32 maxAdds=13;
    string uaClass=14;

}

message CampaingsResponse {
	
	string transactionGUID=1;
	string placementGUID=2;
    string ipAdress=3;
    int32 localHour=4;
    string placementId=5;
    string sub1=6;
    string sub2=7;
    string sub_=8;
    string sub4=9;
    string ua=10;
    string url=11;
    int32 maxAdds=13;
    string uaClass=14;

}

